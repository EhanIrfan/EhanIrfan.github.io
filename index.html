<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URD212 — Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Noto+Nastaliq+Urdu:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #100f0a;
  --s1:      #1a1812;
  --s2:      #24201a;
  --border:  #3e3318;
  --gold:    #b8891f;
  --gold-hi: #d4a232;
  --cream:   #ece0c4;
  --dim:     #7a6a48;
  --green:   #4a9268;
  --red:     #b84c42;
  --blue:    #5578a8;
  --pink:    #a85578;
}

body {
  background: var(--bg);
  color: var(--cream);
  font-family: 'DM Sans', sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* Ambient glow */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 90%, rgba(184,137,31,0.07) 0%, transparent 100%),
    radial-gradient(ellipse 50% 40% at 85% 10%, rgba(184,137,31,0.05) 0%, transparent 100%);
  pointer-events: none;
  z-index: 0;
}

/* =========================================
   START SCREEN
   ========================================= */
#start-screen {
  position: fixed; inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.4rem;
  z-index: 20;
  background: var(--bg);
}

#start-screen.hidden { display: none; }

.s-ornament {
  color: var(--gold);
  font-size: 0.55rem;
  letter-spacing: 0.7em;
  text-transform: uppercase;
  opacity: 0.7;
}

.s-urdu {
  font-family: 'Noto Nastaliq Urdu', serif;
  font-size: 5rem;
  color: var(--gold-hi);
  line-height: 2;
  direction: rtl;
  text-shadow: 0 0 60px rgba(212, 162, 50, 0.25);
}

.s-rule {
  width: 100px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.s-title {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  color: var(--cream);
  letter-spacing: 0.12em;
}

.s-sub {
  font-size: 0.75rem;
  color: var(--dim);
  letter-spacing: 0.1em;
}

/* =========================================
   GAME SCREEN
   ========================================= */
#game-screen {
  position: fixed; inset: 0;
  display: none;
  flex-direction: column;
  z-index: 10;
}

#game-screen.active { display: flex; }

/* --- Stats Bar --- */
.stats-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  height: 54px;
  border-bottom: 1px solid var(--border);
  background: var(--s1);
  flex-shrink: 0;
  position: relative;
  z-index: 2;
}

.stat {
  display: flex;
  align-items: baseline;
  gap: 0.5rem;
}

.stat-lbl {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--dim);
}

.stat-val {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  font-variant-numeric: tabular-nums;
  min-width: 2ch;
}

.stat-val.gold  { color: var(--gold-hi); }
.stat-val.green { color: var(--green); }
.stat-val.red   { color: var(--red); }

.stats-right { display: flex; gap: 2rem; }

.stats-center {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  font-size: 0.62rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--dim);
}

/* --- Main Area --- */
.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.2rem;
  padding: 1.5rem 1.5rem 2.5rem;
  overflow: hidden;
}

/* --- Card --- */
.card {
  width: 100%;
  max-width: 840px;
  background: var(--s1);
  border: 1px solid var(--border);
  position: relative;
  transition: opacity 0.2s ease, transform 0.2s ease;
}

/* Corner accents */
.card::before, .card::after {
  content: '◆';
  position: absolute;
  color: var(--gold);
  font-size: 0.45rem;
  line-height: 1;
  opacity: 0.7;
}
.card::before { top: -0.3rem; left: -0.15rem; }
.card::after  { bottom: -0.3rem; right: -0.15rem; }

.card.exit {
  opacity: 0;
  transform: translateY(-6px);
}

.card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.45rem 1rem;
  border-bottom: 1px solid var(--border);
  background: var(--s2);
}

.card-num {
  font-size: 0.6rem;
  color: var(--dim);
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.card-dir {
  font-size: 0.6rem;
  color: var(--gold);
  letter-spacing: 0.12em;
  font-family: 'Playfair Display', serif;
  font-style: italic;
}

/* --- Word Table --- */
.word-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

.word-table th {
  padding: 0.55rem 0.6rem;
  font-size: 0.58rem;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--dim);
  background: var(--s2);
  border: 1px solid var(--border);
  text-align: center;
}

.word-table td {
  height: 88px;
  border: 1px solid var(--border);
  text-align: center;
  vertical-align: middle;
  padding: 0.6rem;
  transition: background 0.3s ease;
}

/* Column widths */
.col-en { width: 23%; }
.col-ur { width: 27%; }
.col-ge { width: 11%; }
.col-ca { width: 22%; }
.col-pl { width: 17%; }

/* ---- Cell States ---- */

/* Hidden */
.state-hidden .cell-inner {
  font-size: 1.4rem;
  color: var(--border);
  user-select: none;
  display: block;
}

/* Question (the one shown initially) */
.state-question {
  background: rgba(184, 137, 31, 0.08);
}

/* Revealed cells animate in */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}

.state-revealed .cell-inner {
  display: block;
  animation: fadeUp 0.32s ease forwards;
}

/* English cell content */
td.col-en.state-question .cell-inner,
td.col-en.state-revealed .cell-inner {
  font-size: 1.05rem;
  font-weight: 500;
  color: var(--cream);
}

/* Urdu cell content */
td.col-ur.state-question .cell-inner,
td.col-ur.state-revealed .cell-inner {
  font-family: 'Noto Nastaliq Urdu', serif;
  font-size: 1.7rem;
  direction: rtl;
  line-height: 2.2;
  color: var(--cream);
}

/* Gender colors */
td.col-ge.state-revealed .cell-inner       { font-size: 0.75rem; letter-spacing: 0.04em; }
td.col-ge.state-revealed .cell-inner.m-col { color: var(--blue);  font-weight: 500; }
td.col-ge.state-revealed .cell-inner.f-col { color: var(--pink);  font-weight: 500; }
td.col-ge.state-revealed .cell-inner.n-col { color: var(--dim); }

/* Category */
td.col-ca.state-revealed .cell-inner {
  font-size: 0.78rem;
  color: var(--cream);
  opacity: 0.85;
}

/* Plural */
td.col-pl.state-revealed .cell-inner {
  font-family: 'Noto Nastaliq Urdu', serif;
  font-size: 1.4rem;
  direction: rtl;
  line-height: 2;
  color: var(--cream);
}
td.col-pl.state-revealed .cell-inner.no-plural {
  font-family: 'DM Sans', sans-serif;
  font-size: 1rem;
  color: var(--dim);
  direction: ltr;
}

/* =========================================
   BUTTONS
   ========================================= */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.62rem 1.8rem;
  border: 1px solid var(--gold);
  background: transparent;
  color: var(--gold-hi);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.16s ease, color 0.16s ease;
}

.btn:hover { background: var(--gold); color: var(--bg); }
.btn:focus-visible { outline: 1px solid var(--gold-hi); outline-offset: 2px; }

.btn-ok { border-color: var(--green); color: var(--green); }
.btn-ok:hover { background: var(--green); color: #fff; }

.btn-no { border-color: var(--red); color: var(--red); }
.btn-no:hover { background: var(--red); color: #fff; }

.actions {
  display: flex;
  gap: 1rem;
  justify-content: center;
  flex-wrap: wrap;
}

/* =========================================
   PROMPT & HINT
   ========================================= */
.prompt {
  font-size: 0.75rem;
  color: var(--dim);
  letter-spacing: 0.07em;
  text-align: center;
}

.hint {
  font-size: 0.6rem;
  color: rgba(122, 106, 72, 0.45);
  letter-spacing: 0.08em;
  text-align: center;
}

/* Progress bar */
.progress-wrap {
  width: 100%;
  max-width: 840px;
}
.progress-bar {
  height: 2px;
  width: 100%;
  background: var(--s2);
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold) 0%, var(--gold-hi) 100%);
  transition: width 0.4s ease;
}

/* Score flash */
.flash {
  position: fixed;
  top: 64px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  pointer-events: none;
  opacity: 0;
  z-index: 100;
}

@keyframes flashAnim {
  0%   { opacity: 0; transform: translateX(-50%) translateY(-4px); }
  15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
  70%  { opacity: 1; }
  100% { opacity: 0; }
}

.flash.go { animation: flashAnim 0.85s ease forwards; }
.flash.ok  { color: var(--green); }
.flash.no  { color: var(--red); }
</style>
</head>

// ============================================================
//  GAME STATE
// ============================================================
let deck      = [];
let deckPos   = 0;
let nCorrect  = 0;
let nWrong    = 0;
let secs      = 0;
let timerID   = null;
let showingEn = true;   // true = English shown as question
let revealed  = false;

// ---- Helpers ----
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setCell(id, colClass, state, content, innerClass = '') {
  const td = document.getElementById(id);
  td.className = `${colClass} state-${state}`;
  const span = td.querySelector('.cell-inner');
  span.className = innerClass ? `cell-inner ${innerClass}` : 'cell-inner';
  span.textContent = content;
}

// ---- Start ----
function startGame() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.add('active');
  deck    = shuffle(W.map((_, i) => i));
  deckPos = 0;
  nCorrect = nWrong = secs = 0;
  timerID = setInterval(() => {
    secs++;
    const m = Math.floor(secs / 60), s = secs % 60;
    document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }, 1000);
  showCard();
}

// ---- Show question ----
function showCard() {
  if (deckPos >= deck.length) {
    deck = shuffle(W.map((_, i) => i));
    deckPos = 0;
  }

  const [urdu, english, gender, category, plural] = W[deck[deckPos]];
  showingEn = Math.random() < 0.5;
  revealed  = false;

  // Card meta
  document.getElementById('card-num').textContent =
    `${deckPos + 1} / ${deck.length}`;
  document.getElementById('card-dir').textContent =
    showingEn ? 'English → Urdu' : 'Urdu → English';

  // Hide all cells
  setCell('td-en', 'col-en', 'hidden', '—');
  setCell('td-ur', 'col-ur', 'hidden', '—');
  setCell('td-ge', 'col-ge', 'hidden', '—');
  setCell('td-ca', 'col-ca', 'hidden', '—');
  setCell('td-pl', 'col-pl', 'hidden', '—');

  // Show question cell
  if (showingEn) {
    setCell('td-en', 'col-en', 'question', english);
  } else {
    setCell('td-ur', 'col-ur', 'question', urdu);
  }

  // Progress
  document.getElementById('progress-fill').style.width =
    `${((deckPos + 1) / deck.length) * 100}%`;

  // Buttons + prompt
  document.getElementById('actions').innerHTML =
    `<button class="btn" onclick="reveal()">Reveal Answer</button>`;
  document.getElementById('prompt').textContent =
    showingEn ? 'What is this in Urdu?' : 'What does this mean?';
}

// ---- Reveal answer ----
function reveal() {
  if (revealed) return;
  revealed = true;

  const [urdu, english, gender, category, plural] = W[deck[deckPos]];

  // Re-render question cell (already visible, no animation needed)
  if (showingEn) {
    setCell('td-en', 'col-en', 'question', english);
  } else {
    setCell('td-ur', 'col-ur', 'question', urdu);
  }

  // Animate in hidden cells
  if (showingEn) {
    setCell('td-ur', 'col-ur', 'revealed', urdu);
  } else {
    setCell('td-en', 'col-en', 'revealed', english);
  }

  // Gender
  const gLabel = gender === 'M' ? 'Masculine' : gender === 'F' ? 'Feminine' : '—';
  const gClass = gender === 'M' ? 'm-col' : gender === 'F' ? 'f-col' : 'n-col';
  setCell('td-ge', 'col-ge', 'revealed', gLabel, gClass);

  // Category
  setCell('td-ca', 'col-ca', 'revealed', category);

  // Plural
  if (plural && plural.trim() !== '') {
    setCell('td-pl', 'col-pl', 'revealed', plural);
  } else {
    setCell('td-pl', 'col-pl', 'revealed', '—', 'no-plural');
  }

  // Buttons + prompt
  document.getElementById('actions').innerHTML = `
    <button class="btn btn-no"  onclick="mark(false)">✗ &nbsp;Wrong</button>
    <button class="btn btn-ok"  onclick="mark(true)">✓ &nbsp;Correct</button>
  `;
  document.getElementById('prompt').textContent = 'How did you do?';
}

// ---- Mark result ----
function mark(ok) {
  if (ok) {
    nCorrect++;
    document.getElementById('n-correct').textContent = nCorrect;
    flash('✓  Correct', true);
  } else {
    nWrong++;
    document.getElementById('n-wrong').textContent = nWrong;
    flash('✗  Wrong', false);
  }

  // Transition to next card
  const card = document.getElementById('card');
  card.classList.add('exit');
  setTimeout(() => {
    card.classList.remove('exit');
    deckPos++;
    showCard();
  }, 180);
}

// ---- Flash message ----
function flash(msg, ok) {
  const el = document.getElementById('flash');
  el.textContent = msg;
  el.className = `flash ${ok ? 'ok' : 'no'}`;
  // trigger reflow to restart animation
  void el.offsetWidth;
  el.classList.add('go');
  setTimeout(() => { el.className = 'flash'; }, 850);
}

// ---- Keyboard shortcuts ----
document.addEventListener('keydown', e => {
  if (!document.getElementById('game-screen').classList.contains('active')) return;
  if (e.code === 'Space') {
    e.preventDefault();
    if (!revealed) reveal();
  } else if (e.code === 'ArrowRight') {
    if (revealed) mark(true);
  } else if (e.code === 'ArrowLeft') {
    if (revealed) mark(false);
  }
});
</script>
